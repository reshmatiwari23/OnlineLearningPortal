server:
  port: 8082

spring:
  application:
    name: course-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:olp_db}
    username: ${DB_USERNAME:olp_admin}
    password: ${DB_PASSWORD:localpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: course-service-pool
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

# ── AWS S3 configuration ─────────────────────────────────────────
aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    videos-bucket: ${S3_VIDEOS_BUCKET:olp-videos-local}
    presigned-url-expiry-minutes: 15   # presigned URL valid for 15 minutes

# ── Pagination defaults ──────────────────────────────────────────
pagination:
  default-page-size: 12
  max-page-size: 50

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.olp: DEBUG
