server:
  port: 8082

spring:
  application:
    name: course-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:olp_db}
    username: ${DB_USERNAME:olp_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: course-service-pool
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

aws:
  region: ${AWS_REGION:ap-south-1}
  s3:
    videos-bucket: ${S3_VIDEOS_BUCKET:olp-videos-418272762620}
    presigned-url-expiry-minutes: 15
  cloudfront:
    domain: ${CLOUDFRONT_DOMAIN:}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.olp: INFO
