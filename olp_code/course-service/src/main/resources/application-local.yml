spring:
  datasource:
    url: jdbc:h2:mem:olp_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
 
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
 
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true
 
  h2:
    console:
      enabled: true
      path: /h2-console
 
aws:
  region: ap-south-1
  s3:
    videos-bucket: olp-videos-local
    presigned-url-expiry-minutes: 15
  cloudfront:
    domain:
 
# Using W3Schools sample video — works on most corporate networks
local:
  demo:
    video-url: https://www.w3schools.com/html/mov_bbb.mp4
 
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
 
logging:
  level:
    root: INFO
    com.olp: DEBUG
    org.springframework.web.servlet.resource: ERROR
 
 