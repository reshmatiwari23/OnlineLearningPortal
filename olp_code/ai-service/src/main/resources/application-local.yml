spring:
  data:
    redis:
      host: localhost
      port: 6379
      ssl:
        enabled: false
 
bedrock:
  region: us-east-1
  models:
    sonnet: claude-sonnet-4-6
    haiku: claude-haiku-4-5-20251001
    titan-embeddings: amazon.titan-embed-text-v2:0
  knowledge-base:
    id: local-mock-kb-id
    similarity-threshold: 0.75
    max-results: 5
 
aws:
  region: ap-south-1
  dynamodb:
    region: ap-south-1
    sessions-table: olp-ai-sessions-local
    session-ttl-hours: 24
 
cache:
  recommendations-ttl-minutes: 60
  search-ttl-minutes: 30
 
logging:
  level:
    root: INFO
    com.olp: DEBUG
 
 