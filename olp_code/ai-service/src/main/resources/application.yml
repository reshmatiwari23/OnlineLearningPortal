server:
  port: 8085

spring:
  application:
    name: ai-service
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: ${REDIS_SSL:true}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

bedrock:
  region: ${BEDROCK_REGION:ap-south-1}
  models:
    sonnet: ${BEDROCK_MODEL_SONNET:anthropic.claude-3-sonnet-20240229-v1:0}
    haiku: ${BEDROCK_MODEL_HAIKU:anthropic.claude-3-haiku-20240307-v1:0}
    titan-embeddings: ${BEDROCK_MODEL_EMBEDDINGS:amazon.titan-embed-text-v2:0}
  knowledge-base:
    id: ${BEDROCK_KB_ID:placeholder}
    similarity-threshold: 0.75
    max-results: 5

aws:
  region: ${AWS_REGION:ap-south-1}
  dynamodb:
    region: ${DYNAMODB_REGION:ap-south-1}
    sessions-table: ${DYNAMODB_SESSIONS_TABLE:olp-ai-sessions}
    session-ttl-hours: 24

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.olp: INFO