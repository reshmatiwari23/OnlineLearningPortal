# ================================================================
# application-local.yml — progress-service
# Local development profile — H2 + mock SQS + Redis optional
# ================================================================
 
spring:
  datasource:
    url: jdbc:h2:mem:olp_db;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
 
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
 
  flyway:
    enabled: true
    locations: classpath:db/migration-h2
    baseline-on-migrate: true
 
  h2:
    console:
      enabled: true
      path: /h2-console
 
  data:
    redis:
      host: localhost
      port: 6379
 
aws:
  region: ap-south-1
  sqs:
    progress-queue-url: http://localhost:9324/queue/olp-progress-writes-queue
 
progress:
  redis-ttl-seconds: 60
 
# Disable Redis health check — Redis not required for local development
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: false
 
# Suppress Redis connection error logs — expected locally
logging:
  level:
    root: INFO
    com.olp: DEBUG
    io.lettuce: ERROR
    org.springframework.data.redis: ERROR
 
 