server:
  port: 8084

spring:
  application:
    name: progress-service
  datasource:
    url: jdbc:postgresql://${DB_HOST}:5432/${DB_NAME:olp_db}
    username: ${DB_USERNAME:olp_admin}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: progress-service-pool
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT:6379}
      ssl:
        enabled: ${REDIS_SSL:true}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms

aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    progress-queue-url: ${SQS_PROGRESS_QUEUE_URL}

progress:
  redis-ttl-seconds: 60

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.olp: INFO
