server:
  port: 8084

spring:
  application:
    name: progress-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/${DB_NAME:olp_db}
    username: ${DB_USERNAME:olp_admin}
    password: ${DB_PASSWORD:localpassword}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: progress-service-pool
      maximum-pool-size: 15
      minimum-idle: 3
      connection-timeout: 30000
      idle-timeout: 600000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      # FIX: ElastiCache requires TLS — enabled when REDIS_SSL=true (set this on ECS)
      ssl:
        enabled: ${REDIS_SSL:false}
      # FIX: ElastiCache auth token — set REDIS_PASSWORD on ECS task definition
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 2

aws:
  region: ${AWS_REGION:ap-south-1}
  sqs:
    progress-queue-url: ${SQS_PROGRESS_QUEUE_URL:http://localhost:9324/queue/olp-progress-writes-queue}

progress:
  redis-ttl-seconds: 60
  completion-threshold: 100

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

logging:
  level:
    root: INFO
    com.olp: DEBUG
