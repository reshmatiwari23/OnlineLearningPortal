version: 0.2

env:
  variables:
    REPO_URI: "418272762620.dkr.ecr.ap-south-1.amazonaws.com"
    REGION: "ap-south-1"
    CLUSTER: "olp-cluster"
    APP_NAME: "olp-deploy"

phases:
  install:
    runtime-versions:
      java: corretto17

  pre_build:
    commands:
      - echo Java version
      - java -version
      - echo Logging in to ECR...
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $REPO_URI
      - COMMIT_HASH=$(echo $CODEBUILD_RESOLVED_SOURCE_VERSION | cut -c1-7)
      - IMAGE_TAG=${COMMIT_HASH:-latest}
      - echo "Image tag = $IMAGE_TAG"

  build:
    commands:

      - echo "=== STEP 1 - Unit Tests + JaCoCo Coverage (aws profile) ==="
      - cd olp_code
      - mvn verify -Paws -DskipTests=false --no-transfer-progress -Dsurefire.failIfNoSpecifiedTests=false -Dmaven.test.failure.ignore=true
      - echo "--- Coverage Summary ---"
      - for svc in auth-service course-service enrollment-service progress-service ai-service; do if [ -f "$svc/target/site/jacoco/jacoco.csv" ]; then python3 -c "import csv; rows=list(csv.DictReader(open('$svc/target/site/jacoco/jacoco.csv'))); lc=sum(int(r.get('LINE_COVERED',0)) for r in rows); lm=sum(int(r.get('LINE_MISSED',0)) for r in rows); lp=int(lc/(lc+lm)*100) if lc+lm>0 else 0; print(f'  {\"✅\" if lp>=70 else \"⚠️ \"} $svc line={lp}%')"; else echo "  ⚠️  $svc no coverage data"; fi; done

      - echo "=== STEP 2 - Build Production JARs ==="
      - mvn clean package -Paws -DskipTests --no-transfer-progress
      - cd ..

      - echo "=== STEP 3 - Building Docker images ==="
      - docker build -f olp_code/auth-service/Dockerfile -t $REPO_URI/olp/auth-service:$IMAGE_TAG -t $REPO_URI/olp/auth-service:latest olp_code/
      - docker build -f olp_code/course-service/Dockerfile -t $REPO_URI/olp/course-service:$IMAGE_TAG -t $REPO_URI/olp/course-service:latest olp_code/
      - docker build -f olp_code/enrollment-service/Dockerfile -t $REPO_URI/olp/enrollment-service:$IMAGE_TAG -t $REPO_URI/olp/enrollment-service:latest olp_code/
      - docker build -f olp_code/progress-service/Dockerfile -t $REPO_URI/olp/progress-service:$IMAGE_TAG -t $REPO_URI/olp/progress-service:latest olp_code/
      - docker build -f olp_code/ai-service/Dockerfile -t $REPO_URI/olp/ai-service:$IMAGE_TAG -t $REPO_URI/olp/ai-service:latest olp_code/

  post_build:
    commands:

      - echo "=== STEP 4 - Pushing images to ECR ==="
      - docker push $REPO_URI/olp/auth-service:$IMAGE_TAG
      - docker push $REPO_URI/olp/auth-service:latest
      - docker push $REPO_URI/olp/course-service:$IMAGE_TAG
      - docker push $REPO_URI/olp/course-service:latest
      - docker push $REPO_URI/olp/enrollment-service:$IMAGE_TAG
      - docker push $REPO_URI/olp/enrollment-service:latest
      - docker push $REPO_URI/olp/progress-service:$IMAGE_TAG
      - docker push $REPO_URI/olp/progress-service:latest
      - docker push $REPO_URI/olp/ai-service:$IMAGE_TAG
      - docker push $REPO_URI/olp/ai-service:latest

      - echo "=== STEP 5 - Register Task Definitions ==="
      - aws ecs describe-services --cluster $CLUSTER --services auth-service --region $REGION --query 'services[0].taskDefinition' --output text > /tmp/auth-td.txt
      - aws ecs describe-services --cluster $CLUSTER --services course-service --region $REGION --query 'services[0].taskDefinition' --output text > /tmp/course-td.txt
      - aws ecs describe-services --cluster $CLUSTER --services enrollment-service --region $REGION --query 'services[0].taskDefinition' --output text > /tmp/enrollment-td.txt
      - aws ecs describe-services --cluster $CLUSTER --services progress-service --region $REGION --query 'services[0].taskDefinition' --output text > /tmp/progress-td.txt
      - aws ecs describe-services --cluster $CLUSTER --services ai-service --region $REGION --query 'services[0].taskDefinition' --output text > /tmp/ai-td.txt
      - aws ecs describe-task-definition --task-definition $(cat /tmp/auth-td.txt) --region $REGION --query 'taskDefinition' > /tmp/auth-raw.json
      - aws ecs describe-task-definition --task-definition $(cat /tmp/course-td.txt) --region $REGION --query 'taskDefinition' > /tmp/course-raw.json
      - aws ecs describe-task-definition --task-definition $(cat /tmp/enrollment-td.txt) --region $REGION --query 'taskDefinition' > /tmp/enrollment-raw.json
      - aws ecs describe-task-definition --task-definition $(cat /tmp/progress-td.txt) --region $REGION --query 'taskDefinition' > /tmp/progress-raw.json
      - aws ecs describe-task-definition --task-definition $(cat /tmp/ai-td.txt) --region $REGION --query 'taskDefinition' > /tmp/ai-raw.json
      - python3 olp_code/scripts/update_taskdef.py auth-service $REPO_URI $IMAGE_TAG
      - python3 olp_code/scripts/update_taskdef.py course-service $REPO_URI $IMAGE_TAG
      - python3 olp_code/scripts/update_taskdef.py enrollment-service $REPO_URI $IMAGE_TAG
      - python3 olp_code/scripts/update_taskdef.py progress-service $REPO_URI $IMAGE_TAG
      - python3 olp_code/scripts/update_taskdef.py ai-service $REPO_URI $IMAGE_TAG
      - aws ecs register-task-definition --cli-input-json file:///tmp/taskdef-auth-service.json --region $REGION --query 'taskDefinition.taskDefinitionArn' --output text > /tmp/auth-arn.txt
      - aws ecs register-task-definition --cli-input-json file:///tmp/taskdef-course-service.json --region $REGION --query 'taskDefinition.taskDefinitionArn' --output text > /tmp/course-arn.txt
      - aws ecs register-task-definition --cli-input-json file:///tmp/taskdef-enrollment-service.json --region $REGION --query 'taskDefinition.taskDefinitionArn' --output text > /tmp/enrollment-arn.txt
      - aws ecs register-task-definition --cli-input-json file:///tmp/taskdef-progress-service.json --region $REGION --query 'taskDefinition.taskDefinitionArn' --output text > /tmp/progress-arn.txt
      - aws ecs register-task-definition --cli-input-json file:///tmp/taskdef-ai-service.json --region $REGION --query 'taskDefinition.taskDefinitionArn' --output text > /tmp/ai-arn.txt
      - echo "Task definitions registered"

      - echo "=== STEP 6 - Create AppSpec files ==="
      - python3 olp_code/scripts/create_appspec.py auth-service 8081 $(cat /tmp/auth-arn.txt)
      - python3 olp_code/scripts/create_appspec.py course-service 8082 $(cat /tmp/course-arn.txt)
      - python3 olp_code/scripts/create_appspec.py enrollment-service 8083 $(cat /tmp/enrollment-arn.txt)
      - python3 olp_code/scripts/create_appspec.py progress-service 8084 $(cat /tmp/progress-arn.txt)
      - python3 olp_code/scripts/create_appspec.py ai-service 8085 $(cat /tmp/ai-arn.txt)

      - echo "=== STEP 7 - CodeDeploy Blue/Green ==="
      - python3 olp_code/scripts/deploy.py auth-service $APP_NAME $REGION
      - python3 olp_code/scripts/deploy.py course-service $APP_NAME $REGION
      - python3 olp_code/scripts/deploy.py enrollment-service $APP_NAME $REGION
      - python3 olp_code/scripts/deploy.py progress-service $APP_NAME $REGION
      - python3 olp_code/scripts/deploy.py ai-service $APP_NAME $REGION

      - echo "=== ALL SERVICES DEPLOYED ==="

reports:
  olp-test-reports:
    files:
      - "olp_code/**/target/surefire-reports/TEST-*.xml"
    file-format: JUNITXML
    discard-paths: no

artifacts:
  files:
    - "olp_code/**/target/site/jacoco/**"
