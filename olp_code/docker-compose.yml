# ================================================================
# docker-compose.yml — Online Learning Portal
# Runs all 5 services + H2 + Redis locally
#
# Usage:
#   docker-compose up          — start everything
#   docker-compose up -d       — start in background
#   docker-compose logs -f     — view logs
#   docker-compose down        — stop everything
#
# Note: builds with local profile (H2 + mocks, no AWS SDK needed)
# ================================================================

version: '3.8'

services:

  # ── Redis (for progress-service and ai-service) ──────────────
  redis:
    image: redis:7-alpine
    container_name: olp-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ── auth-service ─────────────────────────────────────────────
  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: olp-auth
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8081/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── course-service ───────────────────────────────────────────
  course-service:
    build:
      context: .
      dockerfile: course-service/Dockerfile
    container_name: olp-course
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8082/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── enrollment-service ───────────────────────────────────────
  enrollment-service:
    build:
      context: .
      dockerfile: enrollment-service/Dockerfile
    container_name: olp-enrollment
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: local
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8083/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── progress-service ─────────────────────────────────────────
  progress-service:
    build:
      context: .
      dockerfile: progress-service/Dockerfile
    container_name: olp-progress
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: local
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8084/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── ai-service ───────────────────────────────────────────────
  ai-service:
    build:
      context: .
      dockerfile: ai-service/Dockerfile
    container_name: olp-ai
    ports:
      - "8085:8085"
    environment:
      SPRING_PROFILES_ACTIVE: local
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8085/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

networks:
  default:
    name: olp-network
